<!DOCTYPE html>
<html lang="en">

<style>
    table, th, td {border: 1px solid black;}
</style>

<head>
    <title> A Catastrophe</title>
    <!-- Required meta tags -->
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN" crossorigin="anonymous">

    <!-- Bootstrap JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-C6RzsynM9kWDrMNeT87bh95OGNyZPhcTNXj1NW7RuBCsyN/o0jlpcV8Qyq46cDfL"
        crossorigin="anonymous"></script>
</head>

<body style="min-height: 100vh; background-color: aquamarine;">
    <div class="container-fluid">
        <div class="row mt-4 mb-4 text-center">
            <div id="removestyle" style="transform: translateY(15vh);" class="col-md-12">
                <h2>BEHOLD, PEASANT: A CAT!</h2><br><br>  
                <!-- Initial Image to be Changed -->
                <img id="catpic"
                    src="https://mymodernmet.com/wp/wp-content/uploads/2022/10/cats-in-medieval-art-fb-thumbnail.jpg"
                    alt="Majestic medieval cats" style="width: 100%; max-width: 600px; height: auto; object-fit: contain;"
                    class="mb-4 img-fluid rounded;"><br><br>
                <!-- API Call Button -->
                <button id="catbutt" class="btn btn-primary mx-auto d-block" onclick="CatCall()">MEOW</button>
            </div>
            <div id="Catfacts" class="col-md-12"></div>

        </div>
        <!-- Table of API Cat Facts, to be written in JS script below-->
        <div class ="row mt-4 mb-4 text-center">
            <div id="cattable" class="col-md-12">

            </div>
        </div>
        <!-- Bonus Cat Clock, using API cat image that conveniently works as clock hands -->
        <div id="catclock" class ="row mt-4 mb-4 text-center" style="display:none">
            <div class ="col-12">
                <h2>Cat Clock</h2>
            </div>
        </div>
        <!-- The cats will cover the time designators and possibly the button at certain times of day, just like a cat would- thus I'm not changing it -->
        <div id="catclock2" class ="row mt-4 mb-4 text-center" style="display:none">
            <div class="col-4 col-md-4">
                <p>HOUR</p>
                <img id="cathour" src="" style="width: 100%; max-width: 300px; height: auto; object-fit: contain;">
            </div>
            <div class="col-4 col-md-4">
                <p>MINUTE</p>
                <img id="catminute" src="" style="width: 100%; max-width: 300px; height: auto; object-fit: contain;">
            </div>
            <div class="col-4 col-md-4">
                <p>SECOND</p>
                <img id="catsecond" src="" style="width: 100%; max-width: 300px; height: auto; object-fit: contain;">
            </div>

        </div>
        <!-- Button to update Cat Clock with Current Time -->
        <div id="clockbutton" class="row mt-4 mb-4 text-center" style="display:none">
            <div class="col-12">
                <button id="menow" class="btn btn-primary mx-auto mb-5 d-block" onclick="ClockCall()">ME-NOW?</button> <br><br>
            </div>
        </div>

    </div>
    <script>
        //API Call function
        async function CatCall() {
            //GET the info
            const url = "https://brianobruno.github.io/cats.json";
            const options = { method: "GET" };
            const response = await fetch(url, options);
            const result = await response.text();
            const catObject = JSON.parse(result);

            //Sort the facts using in-built sort with return function using the factID number
            catObject.facts.sort(function(cat1,cat2) {
                return cat1.factId - cat2.factId;
            });
            //image replacement using the API cat photo
            document.getElementById("catpic").src = catObject.catPhoto;
            document.getElementById("cathour").src = catObject.catPhoto;
            document.getElementById("catminute").src = catObject.catPhoto;
            document.getElementById("catsecond").src = catObject.catPhoto;

            document.getElementById("catbutt").remove(); //removes the API call button after clicking
            document.getElementById("removestyle").style.removeProperty("transform"); // shifting for prettiness

            //string to contain the HTML table code with facts
            var tabletext = "<table class='table table-striped table-bordered mb-5'>" + "<tr><th>factID</th><th>fact</th></tr>";
            
            //loop conCATenates the ordered facts into tabletext string ready for HTML table
            for (var i = 0; i < catObject.facts.length; i++) {
                tabletext += "<tr><td>" + catObject.facts[i].factId + "</td><td>" + catObject.facts[i].text + "</td></tr>";
            };
            
            tabletext += "</table>";

            //writes table into the page
            document.getElementById("cattable").innerHTML = tabletext;

            //makes the clock and button visible or not when intended
            document.getElementById("catclock").style.display = "block";
            document.getElementById("catclock2").style.removeProperty("display");
            document.getElementById("clockbutton").style.display = "block";
        }

        // Building the Cat Clock
        function ClockCall() {
            let now = new Date;
            let hour = now.getHours() % 12;
            let minute = now.getMinutes();
            let second = now.getSeconds();
            let hourtranslate = -90 + hour*30;     // Cat photo initially points right, so move 90deg up to 0/12, then add hour * 360/12 for angle of hour hand
            let minutetranslate = -90 + minute*6;   // Same, but we add current minute * 360/60 for angle of the minute hand
            let secondtranslate = -90 + second*6;   // same as minutes, for the second hand. Note all hands only increment with their category, ie hour jumps from 12 to 1 position, not gradually

            // rotates the photos to correspond to the proper time. the cat will get in the way, like a cat. 
            document.getElementById("cathour").style.transform = "rotate(" + hourtranslate + "deg)";
            document.getElementById("catminute").style.transform = "rotate(" + minutetranslate + "deg)";
            document.getElementById("catsecond").style.transform = "rotate(" + secondtranslate + "deg)";
        }
    </script>
</body>

</html>
